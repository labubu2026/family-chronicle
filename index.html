<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家族编年史</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body { background: #f5f5f5; padding: 10px; }
        .password-box {
            max-width: 400px; margin: 100px auto; background: white;
            padding: 30px; border-radius: 12px; box-shadow: 0 0 15px rgba(0,0,0,0.1); text-align: center;
        }
        .password-box h2 { margin-bottom: 20px; color: #333; }
        .password-box input {
            width: 100%; padding: 12px; font-size: 18px; margin: 15px 0;
            border: 1px solid #ddd; border-radius: 8px; text-align: center;
        }
        .password-box button {
            padding: 12px 30px; font-size: 18px; background: #2d8cf0;
            color: white; border: none; border-radius: 8px; cursor: pointer;
        }
        .container {
            display:none; max-width: 1000px; margin: 0 auto; background: white;
            padding: 15px; border-radius: 12px; box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .nav {
            display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;
            align-items: center; justify-content: space-between;
        }
        .nav button, .nav select, .nav input {
            padding: 10px 15px; font-size: 16px; border-radius: 8px;
            border: 1px solid #ddd; background: white; cursor: pointer;
        }
        .nav .active { background: #2d8cf0; color: white; border-color: #2d8cf0; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 10px; }
        .calendar-header {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;
            font-weight: bold; color: #555; margin-bottom: 8px;
        }
        .calendar-header div { text-align: center; padding: 10px; background: #f0f0f0; border-radius: 6px; font-size: 16px; }
        .day {
            aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; background: #fafafa; border-radius: 6px; cursor: pointer;
            font-size: 16px; position: relative; min-height: 60px;
        }
        .day:hover { background: #e6f2ff; }
        .day.has-record::after {
            content: ""; width: 8px; height: 8px; background: #ff5722;
            border-radius: 50%; position: absolute; bottom: 5px;
        }
        .empty { background: transparent; cursor: default; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 999; align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; width: 90%; max-width: 600px; padding: 20px;
            border-radius: 12px; max-height: 90vh; overflow-y: auto;
        }
        .modal-content h3 { margin-bottom: 15px; text-align: center; }
        .modal-content textarea {
            width: 100%; height: 150px; padding: 10px; font-size: 16px;
            border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px;
        }
        .modal-content input[type="file"] { margin-bottom: 10px; font-size: 16px; }
        .modal-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .modal-buttons button { padding: 10px 20px; font-size: 16px; border-radius: 8px; border: none; cursor: pointer; }
        .btn-save { background: #2d8cf0; color: white; }
        .btn-cancel { background: #f0f0f0; color: #333; }
        .read-mode { display: none; margin-top: 20px; }
        .record-item {
            background: #f9f9f9; padding: 15px; border-radius: 8px;
            margin-bottom: 10px; border-left: 4px solid #2d8cf0;
        }
        .record-date { font-weight: bold; color: #2d8cf0; margin-bottom: 8px; font-size: 17px; }
        .record-content { font-size: 16px; line-height: 1.6; margin-bottom: 8px; }
        .record-img { max-width: 100%; border-radius: 6px; margin: 8px 0; }
        .record-actions { display: flex; gap: 10px; margin-top: 10px; }
        .record-actions button { padding: 6px 12px; font-size: 15px; border-radius: 6px; border: none; cursor: pointer; }
        .btn-edit { background: #ff9800; color: white; }
        .btn-delete { background: #f44336; color: white; }
        .sync-status { text-align: center; margin: 10px 0; font-weight: bold; }
        @media (max-width: 600px) {
            .nav { flex-direction: column; align-items: stretch; }
            .day { font-size: 14px; min-height: 50px; }
            .calendar-header div { font-size: 14px; padding: 8px; }
        }
    </style>
</head>
<body>

<div class="password-box" id="passwordBox">
    <h2>家族编年史</h2>
    <p>请输入密码访问</p>
    <input type="password" id="password" placeholder="输入密码" autocomplete="off">
    <button onclick="checkPassword()">确认进入</button>
</div>

<div class="container" id="mainContainer">
    <div class="nav">
        <div>
            <input type="number" id="yearInput" min="1930" max="2100" placeholder="年份">
            <input type="number" id="monthInput" min="1" max="12" placeholder="月份">
            <button onclick="jumpToDate()">跳转</button>
        </div>
        <div>
            <button id="btnCalendar" class="active" onclick="switchMode('calendar')">日历模式</button>
            <button id="btnRead" onclick="switchMode('read')">阅读模式</button>
            <button onclick="exportBackup()">导出备份</button>
            <button onclick="importBackup()">导入备份</button>
            <button onclick="forceSync()">强制同步云端</button>
        </div>
    </div>

    <div id="syncStatus" class="sync-status"></div>

    <div id="calendarMode">
        <div class="calendar-header">
            <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
        </div>
        <div class="calendar" id="calendarDays"></div>
    </div>

    <div class="read-mode" id="readMode">
        <div style="margin-bottom:15px;">
            <select id="filterYear" onchange="filterRecords()"></select>
            <select id="filterMonth" onchange="filterRecords()"></select>
        </div>
        <div id="recordsList"></div>
    </div>
</div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <h3 id="modalTitle">编辑家族记录</h3>
        <textarea id="recordContent" placeholder="请输入文字内容..."></textarea>
        <input type="file" id="imageInput" accept="image/*">
        <div id="previewImg"></div>
        <input type="hidden" id="currentDate">
        <input type="hidden" id="editId">
        <div class="modal-buttons">
            <button class="btn-save" onclick="saveRecord()">保存</button>
            <button class="btn-cancel" onclick="closeModal()">取消</button>
        </div>
    </div>
</div>

<script>
const PASSWORD = "45461";
const NPOINT_URL = "https://api.npoint.io/36035f66bd380dc9e7e5";
const LOCAL_KEY = "family_chronicle_records";

// 图片配置（已帮你调好，不用改）
const MAX_FILE_SIZE_MB = 10;
const MAX_IMAGE_WIDTH = 1200;
const IMAGE_QUALITY = 0.85;

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth() + 1;
let allRecords = [];

// 状态提示
function showSyncStatus(text, isError=false) {
    const el = document.getElementById("syncStatus");
    el.textContent = text;
    el.style.color = isError ? "red" : "green";
    setTimeout(()=> el.textContent = "", 3000);
}

// 密码验证
function checkPassword() {
    const input = document.getElementById("password").value.trim();
    if (input === PASSWORD) {
        document.getElementById("passwordBox").style.display = "none";
        document.getElementById("mainContainer").style.display = "block";
        loadFromLocal();
        loadFromCloud();
    } else {
        alert("密码错误，请重试！");
    }
}

// 切换模式
function switchMode(mode) {
    const calendar = document.getElementById("calendarMode");
    const read = document.getElementById("readMode");
    const btnCal = document.getElementById("btnCalendar");
    const btnRead = document.getElementById("btnRead");
    if (mode === "calendar") {
        calendar.style.display = "block"; read.style.display = "none";
        btnCal.classList.add("active"); btnRead.classList.remove("active");
        renderCalendar();
    } else {
        calendar.style.display = "none"; read.style.display = "block";
        btnCal.classList.remove("active"); btnRead.classList.add("active");
        initFilter(); filterRecords();
    }
}

// 本地存储
function saveToLocal() {
    localStorage.setItem(LOCAL_KEY, JSON.stringify(allRecords));
}

function loadFromLocal() {
    const data = localStorage.getItem(LOCAL_KEY);
    if (data) {
        allRecords = JSON.parse(data);
        renderCalendar();
        showSyncStatus("已加载本地数据");
    }
}

// 云端加载
async function loadFromCloud() {
    try {
        const res = await fetch(NPOINT_URL);
        if (!res.ok) throw new Error("加载失败");
        const data = await res.json();
        if (data.records && Array.isArray(data.records)) {
            const cloudRecords = data.records;
            const localIds = new Set(allRecords.map(r => r.id));
            cloudRecords.forEach(r => {
                if (!localIds.has(r.id)) allRecords.push(r);
            });
            saveToLocal();
            renderCalendar();
            showSyncStatus("已同步云端数据");
        }
    } catch (e) {
        console.error("云端加载失败", e);
    }
}

// 强制同步云端
async function forceSync() {
    const payload = { records: allRecords };
    try {
        const res = await fetch(NPOINT_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error("同步失败");
        showSyncStatus("强制同步成功！");
        return true;
    } catch (e) {
        console.error("同步失败", e);
        showSyncStatus("云端同步失败，请稍后再试", true);
        return false;
    }
}

// 渲染日历
function renderCalendar() {
    const container = document.getElementById("calendarDays");
    container.innerHTML = "";
    document.getElementById("yearInput").value = currentYear;
    document.getElementById("monthInput").value = currentMonth;
    const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
    for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement("div");
        empty.className = "day empty";
        container.appendChild(empty);
    }
    for (let d = 1; d <= daysInMonth; d++) {
        const day = document.createElement("div");
        day.className = "day";
        day.innerText = d;
        const dateStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        if (allRecords.some(r => r.date === dateStr)) day.classList.add("has-record");
        day.onclick = () => openEditModal(dateStr);
        container.appendChild(day);
    }
}

// 跳转年月
function jumpToDate() {
    const y = parseInt(document.getElementById("yearInput").value);
    const m = parseInt(document.getElementById("monthInput").value);
    if (y >= 1930 && y <= 2100 && m >= 1 && m <= 12) {
        currentYear = y; currentMonth = m;
        renderCalendar();
    } else {
        alert("请输入1930-2100年，1-12月");
    }
}

// 打开编辑弹窗
function openEditModal(date, record = null) {
    document.getElementById("editModal").style.display = "flex";
    document.getElementById("currentDate").value = date;
    document.getElementById("modalTitle").innerText = `${date} 家族记录`;
    document.getElementById("recordContent").value = record ? record.content : "";
    document.getElementById("editId").value = record ? record.id : "";
    document.getElementById("previewImg").innerHTML = record?.image ? `<img src="${record.image}" class="record-img">` : "";
}

// 关闭弹窗
function closeModal() {
    document.getElementById("editModal").style.display = "none";
    document.getElementById("imageInput").value = "";
    document.getElementById("previewImg").innerHTML = "";
}

// 图片压缩：超10MB直接拦截，大图缩到1200宽，画质85%，小图尽量保真
function compressImage(file) {
    return new Promise((resolve, reject) => {
        // 限制10MB
        const maxSize = MAX_FILE_SIZE_MB * 1024 * 1024;
        if (file.size > maxSize) {
            reject(`图片不能超过${MAX_FILE_SIZE_MB}MB，请压缩后再上传`);
            return;
        }
        const img = new Image();
        img.onload = () => {
            let w = img.width;
            let h = img.height;
            // 仅宽度超过才缩小，小图保持原图尺寸
            if (w > MAX_IMAGE_WIDTH) {
                h = (MAX_IMAGE_WIDTH / w) * h;
                w = MAX_IMAGE_WIDTH;
            }
            const canvas = document.createElement("canvas");
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL("image/jpeg", IMAGE_QUALITY));
        };
        img.onerror = () => reject("图片加载失败");
        img.src = URL.createObjectURL(file);
    });
}

// 保存记录
async function saveRecord() {
    const date = document.getElementById("currentDate").value;
    const content = document.getElementById("recordContent").value.trim();
    const editId = document.getElementById("editId").value;
    const file = document.getElementById("imageInput").files[0];

    if (!content && !file) { 
        alert("请输入内容或选择图片"); 
        return; 
    }

    let imageBase64 = "";
    if (file) {
        try {
            imageBase64 = await compressImage(file);
        } catch (err) {
            alert(err);
            return;
        }
    }

    const record = {
        id: editId || Date.now().toString(),
        date, content, image: imageBase64,
        time: new Date().toLocaleString()
    };

    if (editId) {
        const index = allRecords.findIndex(r => r.id === editId);
        allRecords[index] = record;
    } else {
        allRecords.push(record);
    }

    saveToLocal();
    closeModal();
    renderCalendar();
    showSyncStatus("已保存到本地，后台同步云端...");
    
    setTimeout(() => forceSync(), 1000);
}

// 初始化筛选器
function initFilter() {
    const yearSelect = document.getElementById("filterYear");
    const monthSelect = document.getElementById("filterMonth");
    yearSelect.innerHTML = `<option value="">全部年份</option>`;
    monthSelect.innerHTML = `<option value="">全部月份</option>`;
    const years = [...new Set(allRecords.map(r => r.date.split("-")[0]))].sort();
    years.forEach(y => yearSelect.innerHTML += `<option value="${y}">${y}年</option>`);
    for (let m = 1; m <= 12; m++) {
        monthSelect.innerHTML += `<option value="${m}">${m}月</option>`;
    }
}

// 筛选记录
function filterRecords() {
    const year = document.getElementById("filterYear").value;
    const month = document.getElementById("filterMonth").value;
    let list = [...allRecords].sort((a, b) => a.date.localeCompare(b.date));
    if (year) list = list.filter(r => r.date.startsWith(year));
    if (month) list = list.filter(r => r.date.split("-")[1] === String(month).padStart(2, '0'));
    renderRecords(list);
}

// 渲染阅读列表
function renderRecords(list) {
    const container = document.getElementById("recordsList");
    container.innerHTML = list.length === 0 ? "<p style='text-align:center;padding:20px;'>暂无记录</p>" : "";
    list.forEach(record => {
        const div = document.createElement("div");
        div.className = "record-item";
        div.innerHTML = `
            <div class="record-date">${record.date}</div>
            <div class="record-content">${record.content}</div>
            ${record.image ? `<img src="${record.image}" class="record-img">` : ""}
            <div class="record-actions">
                <button class="btn-edit" onclick="editRecord('${record.id}')">编辑</button>
                <button class="btn-delete" onclick="deleteRecord('${record.id}')">删除</button>
            </div>
        `;
        container.appendChild(div);
    });
}

// 编辑
function editRecord(id) {
    const record = allRecords.find(r => r.id === id);
    openEditModal(record.date, record);
}

// 删除
async function deleteRecord(id) {
    if (!confirm("确定删除这条记录吗？")) return;
    allRecords = allRecords.filter(r => r.id !== id);
    saveToLocal();
    filterRecords();
    renderCalendar();
    setTimeout(() => forceSync(), 500);
}

// 导出备份
function exportBackup() {
    const blob = new Blob([JSON.stringify(allRecords, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `家族编年史备份_${new Date().toLocaleDateString()}.json`;
    a.click();
}

// 导入备份
function importBackup() {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".json";
    input.onchange = async e => {
        const file = e.target.files[0];
        const text = await file.text();
        try {
            const backupRecords = JSON.parse(text);
            const newIds = new Set(allRecords.map(r => r.id));
            backupRecords.forEach(r => {
                if (!newIds.has(r.id)) allRecords.push(r);
            });
            saveToLocal();
            renderCalendar();
            alert("导入成功！");
            setTimeout(() => forceSync(), 500);
        } catch (err) {
            alert("备份文件格式错误");
        }
    };
    input.click();
}

window.onload = () => {
    document.getElementById("password").focus();
};
</script>

</body>
</html>
